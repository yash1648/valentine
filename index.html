<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Valentine? 💕</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Dancing+Script:wght@400;700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Floating Background Hearts Container -->
    <div class="floating-hearts-container"></div>

    <!-- Main Content -->
    <div class="container">
        <h1 class="title">Will You Be My Valentine? 💕</h1>
        <p class="subtitle">Let's make this special...</p>
        
        <div class="button-container">
            <button class="btn btn-yes" id="yesBtn">💗 YES</button>
            <button class="btn btn-no" id="noBtn">💔 NO</button>
        </div>
    </div>

    <!-- Celebration Modal -->
    <div class="celebration" id="celebration">
        <div class="celebration-content">
            <div class="celebration-hearts">💖 💕 💝</div>
            <h2 class="celebration-title">YAYYYYY!!! 💕</h2>
            <p class="celebration-message">
                You just made my heart explode with happiness! 💖
                <br><br>
                I promise unlimited hugs, chocolates, and love forever! 🍫💞
            </p>
            <div class="celebration-hearts">💕 💖 💝</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
